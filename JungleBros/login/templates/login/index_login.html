<!DOCTYPE html>
<html>
<head>
    <title>Login - Jungle Bros</title>
</head>
<body>

    <form method = 'POST'>
        {% csrf_token %}

        <label>Usuario:</label>
        <input type = 'text' name = 'username'>

        <label>Senha:</label>
        <input type = 'password' name = 'password'>

        <button type = 'submit'>Entrar</button>
    </form>

    {% csrf_token %}
    {% if messages %}
        {% for message in messages %}
            <p style = 'color: red;' >{{ message }}</p>
        {%endfor%}
    {%endif%}

</body>
</html>
